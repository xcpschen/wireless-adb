name: Build APK

on:
  push:
    tags:
      - 'v*'
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
      
      # 解码密钥库（如果 Secrets 已配置）
      - name: Decode Keystore
        if: ${{ env.KEYSTORE != '' }}
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > wireless-adb.keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
      
      # 创建 keystore.properties（如果 Secrets 已配置）
      - name: Create Keystore Properties
        if: ${{ env.KEYSTORE_PASSWORD != '' }}
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > keystore.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "storeFile=../wireless-adb.keystore" >> keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      
      - name: Build Release APK
        run: ./gradlew assembleRelease
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wireless-adb-debug
          path: app/build/outputs/apk/debug/wireless-adb-*.apk
          retention-days: 30
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: wireless-adb-release
          path: app/build/outputs/apk/release/wireless-adb-*.apk
          retention-days: 30
